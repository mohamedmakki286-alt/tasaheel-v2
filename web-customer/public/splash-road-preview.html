<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>معاينة طريق تساهيل</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100svh; background: #000; overflow: hidden; }
      .screen { position: relative; width: min(100vw, 460px); height: 100svh; margin: auto; overflow: hidden; background: #000; }
      .car { width: 100%; height: 100%; object-fit: cover; display: block; }
      .road { position: absolute; z-index: 2; top: 56.2%; left: 11%; width: 78%; height: 48px; overflow: hidden; pointer-events: none; }
      .road::before, .road::after { content: ""; position: absolute; inset: 0 -30%; background-repeat: repeat-x; background-size: 104px 14px; animation: move 1.25s linear infinite; }
      .road::before { top: 6px; height: 3px; background-image: linear-gradient(90deg, transparent 0 20px, rgba(255,255,255,.94) 20px 67px, transparent 67px 104px); box-shadow: 0 0 6px rgba(255,255,255,.36); animation-direction: reverse; }
      .road::after { top: 24px; height: 2px; background-image: linear-gradient(90deg, transparent 0 38px, rgba(246,162,26,.92) 38px 76px, transparent 76px 104px); background-size: 138px 12px; animation-duration: .95s; animation-direction: reverse; box-shadow: 0 0 9px rgba(246,162,26,.66); }
      .glow { position: absolute; z-index: 1; top: 53%; left: 21%; width: 58%; height: 10%; border-radius: 50%; background: radial-gradient(ellipse, rgba(246,162,26,.10), transparent 70%); filter: blur(13px); }
      .label { position: absolute; z-index: 3; bottom: 7vh; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.42); font: 11px Tahoma, Arial, sans-serif; }
      @keyframes move { from { transform: translateX(0); } to { transform: translateX(104px); } }
      @media (prefers-reduced-motion: reduce) { .road::before, .road::after { animation: none; } }
    </style>
  </head>
  <body>
    <main class="screen">
      <img class="car" src="/splash-car-reference.jpeg" alt="سيارة تساهيل الخطية" />
      <div class="glow"></div>
      <div class="road" aria-hidden="true"></div>
      <div class="label">معاينة حركة الطريق — الصورة الأصلية لم تتغير</div>
    </main>
  </body>
</html>
