server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        ssl: true
        sslmode: require
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # Schema changes are applied through the reviewed Supabase migrations.
      # The Railway runtime account intentionally has no ownership privileges.
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    defer-datasource-initialization: false

  sql:
    init:
      mode: never

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

application:
  name: Tasaheel
  jwt:
    secret: ${APPLICATION_JWT_SECRET}
    expiration: 604800000
  upload:
    dir: ${APPLICATION_UPLOAD_DIR:/tmp/tasaheel/uploads}
  moyasar:
    secret-key: ${MOYASAR_SECRET_KEY:}
    base-url: https://api.moyasar.com/v1
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
  firebase:
    config-path: classpath:firebase-service-account.json
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-1.5-flash
    provider: gemini
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:tasaheel-backend}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{X-Request-ID}] - %msg%n"
  level:
    com.tasaheel: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
