server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:tasaheel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  sql:
    init:
      mode: always
      continue-on-error: true

application:
  name: Tasaheel
  jwt:
    secret: ${JWT_SECRET:dGFzYWhlZWwtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tYW5kLXZhbGlkYXRpb24tZm9yLXRhc2FoZWVsLXBsYXRmb3JtLTIwMjQ=}
    expiration: 604800000
  upload:
    dir: ${user.home}/tasaheel/uploads
  moyasar:
    secret-key: moyasar_secret_key_placeholder
    base-url: https://api.moyasar.com/v1
  google:
    maps:
      api-key: AIzaXXXXXXXXXXXXXXXXXXXXXXXXXXX
  firebase:
    config-path: classpath:firebase-service-account.json
  ai:
    gemini:
      api-key: ""
      model: gemini-1.5-flash
    provider: gemini
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:tasaheel-backend}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{X-Request-ID}] - %msg%n"
  level:
    com.tasaheel: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
